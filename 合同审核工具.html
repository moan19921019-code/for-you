        <div class="form-group">
          <label class="form-label">未匹配时的建议文字</label>
          <input class="form-input" id="editRuleSuggestion" value="${escapeHtml(rule.suggestion||'')}">
        </div>
        <div class="form-group">
          <label class="form-label">匹配成功时的描述（可选）</label>
          <input class="form-input" id="editRuleHintPass" value="${escapeHtml(rule.hint_pass||'')}">
        </div>
        <div class="rule-test-area">
          <label class="form-label">🧪 测试匹配</label>
          <textarea class="form-textarea" id="ruleTestInput" placeholder="输入测试文本...">${extractedText ? extractedText.slice(0, 500) : ''}</textarea>
          <button class="btn btn-secondary btn-sm" style="margin-top:6px;" onclick="testRule()">▶ 测试</button>
          <div id="ruleTestResult"></div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="saveRuleEdit()">💾 保存修改</button>
          <button class="btn btn-secondary btn-sm" style="color:var(--error);" onclick="deleteRule('${rule.id}')">🗑 删除</button>
          <button class="btn btn-secondary btn-sm" onclick="duplicateRule('${rule.id}')">📋 复制</button>
        </div>
      </div>`;
    }
  } else {
    html += `<div class="rule-editor-empty">点击左侧规则查看和编辑详情<br>或点击「新增规则」创建自定义规则</div>`;
  }

  html += `</div>`;
  body.innerHTML = html;
}

function selectRule(id) {
  editingRuleId = id;
  renderRuleEditor();
}

function toggleRule(id) {
  const rule = auditRules.find(r => r.id === id);
  if (rule) {
    rule.enabled = rule.enabled === false ? true : false;
    renderRuleEditor();
  }
}

function saveRuleEdit() {
  if (!editingRuleId) return;
  const rule = auditRules.find(r => r.id === editingRuleId);
  if (!rule) return;

  rule.name = document.getElementById('editRuleName')?.value || rule.name;
  rule.type = document.getElementById('editRuleType')?.value || rule.type;
  rule.severity = document.getElementById('editRuleSeverity')?.value || rule.severity;
  rule.pattern = document.getElementById('editRulePattern')?.value || rule.pattern;
  rule.flags = document.getElementById('editRuleFlags')?.value || '';
  rule.suggestion = document.getElementById('editRuleSuggestion')?.value || '';
  rule.hint_pass = document.getElementById('editRuleHintPass')?.value || '';

  saveRules(auditRules);
  renderRuleEditor();
}

function deleteRule(id) {
  if (!confirm('确定删除这条规则？')) return;
  auditRules = auditRules.filter(r => r.id !== id);
  editingRuleId = null;
  saveRules(auditRules);
  renderRuleEditor();
}

function duplicateRule(id) {
  const rule = auditRules.find(r => r.id === id);
  if (!rule) return;
  const newRule = JSON.parse(JSON.stringify(rule));
  newRule.id = 'r' + Date.now();
  newRule.name = rule.name + ' (副本)';
  auditRules.push(newRule);
  editingRuleId = newRule.id;
  saveRules(auditRules);
  renderRuleEditor();
}

function testRule() {
  if (!editingRuleId) return;
  const rule = auditRules.find(r => r.id === editingRuleId);
  if (!rule) return;

  const testText = document.getElementById('ruleTestInput')?.value || '';
  const resultDiv = document.getElementById('ruleTestResult');
  if (!resultDiv) return;

  let matched = false;
  let detail = '';
  try {
    if (rule.type === 'regex') {
      const re = new RegExp(rule.pattern, rule.flags || '');
      const m = re.exec(testText);
      if (m) { matched = true; detail = '匹配到: ' + (m[1] || m[0]); }
    } else {
      const escaped = rule.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(escaped, rule.flags || '');
      if (re.test(testText)) { matched = true; detail = '找到关键词: ' + rule.pattern; }
    }
  } catch(e) {
    detail = '正则错误: ' + e.message;
  }

  resultDiv.className = 'rule-test-result ' + (matched ? 'match' : 'no-match');
  resultDiv.textContent = matched ? '✅ 匹配成功 — ' + detail : '❌ 未匹配 — ' + (detail || '模式未在测试文本中找到');
}

// Rule editor panel controls
document.getElementById('btnRules').addEventListener('click', () => {
  document.getElementById('ruleEditorOverlay').classList.add('open');
  editingRuleId = null;
  renderRuleEditor();
});

document.getElementById('btnRuleEditorClose').addEventListener('click', () => {
  document.getElementById('ruleEditorOverlay').classList.remove('open');
});

document.getElementById('ruleEditorOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('ruleEditorOverlay').classList.remove('open');
  }
});

document.getElementById('btnRuleAdd').addEventListener('click', () => {
  const newRule = {
    id: 'r' + Date.now(),
    group: '自定义',
    name: '新规则',
    type: 'text',
    pattern: '',
    flags: 'i',
    severity: 'WARN',
    suggestion: '请检查此项',
    hint_pass: '已匹配',
    enabled: true
  };
  auditRules.push(newRule);
  editingRuleId = newRule.id;
  saveRules(auditRules);
  renderRuleEditor();
});

document.getElementById('btnRuleSave').addEventListener('click', () => {
  if (editingRuleId) saveRuleEdit();
  saveRules(auditRules);
  showToast('规则已保存', 'success');
});

document.getElementById('btnRuleReset').addEventListener('click', () => {
  if (!confirm('确定恢复为默认规则？当前自定义规则将丢失。')) return;
  auditRules = JSON.parse(JSON.stringify(DEFAULT_RULES));
  editingRuleId = null;
  saveRules(auditRules);
  renderRuleEditor();
  showToast('已恢复默认规则', 'success');
});

document.getElementById('btnRuleExport').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(auditRules, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'audit_rules_export.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('规则已导出', 'success');
});

document.getElementById('btnRuleImport').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    try {
      const text = await e.target.files[0].text();
      const imported = JSON.parse(text);
      if (!Array.isArray(imported)) throw new Error('格式错误');
      auditRules = imported;
      editingRuleId = null;
      saveRules(auditRules);
      renderRuleEditor();
      showToast(`已导入 ${imported.length} 条规则`, 'success');
    } catch(err) {
      showToast('导入失败: ' + err.message, 'error');
    }
  };
  input.click();
});

// ============================================================
// CONFIG PANEL
// ============================================================
document.getElementById('btnConfig').addEventListener('click', () => {
  document.getElementById('configOverlay').classList.add('open');
  // Load saved values
  document.getElementById('apiKey').value = localStorage.getItem('deepseek_api_key') || '';
  document.getElementById('aiModel').value = localStorage.getItem('ai_model') || 'deepseek-chat';
  document.getElementById('auditFocus').value = localStorage.getItem('audit_focus') || '';
  document.getElementById('backendUrl').value = localStorage.getItem('backend_url') || API;
});

document.getElementById('btnConfigClose').addEventListener('click', () => {
  document.getElementById('configOverlay').classList.remove('open');
});

document.getElementById('configOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('configOverlay').classList.remove('open');
  }
});

document.getElementById('btnConfigSave').addEventListener('click', () => {
  localStorage.setItem('deepseek_api_key', document.getElementById('apiKey').value);
  localStorage.setItem('ai_model', document.getElementById('aiModel').value);
  localStorage.setItem('audit_focus', document.getElementById('auditFocus').value);
  localStorage.setItem('backend_url', document.getElementById('backendUrl').value);
  document.getElementById('configOverlay').classList.remove('open');
  showToast('配置已保存', 'success');
  checkHealth();
});

// ============================================================
// UPLOAD HANDLERS
// ============================================================
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => {
  if (!dropZone.classList.contains('disabled')) fileInput.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); if (!dropZone.classList.contains('disabled')) dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (!dropZone.classList.contains('disabled') && e.dataTransfer.files.length) {
    runAudit([...e.dataTransfer.files]);
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) runAudit([...fileInput.files]);
  fileInput.value = '';
});

// AI polish button
document.getElementById('btnAiPolish').addEventListener('click', async () => {
  if (!quillEditor) return;
  const selection = quillEditor.getSelection();
  if (!selection || selection.length === 0) {
    showToast('请先选中要优化的段落', 'info');
    return;
  }

  const selectedText = quillEditor.getText(selection.index, selection.length);
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { showToast('请先配置 API Key', 'error'); return; }

  showToast('AI 优化中...', 'info');
  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: localStorage.getItem('ai_model') || 'deepseek-chat',
        messages: [
          { role: 'system', content: '你是合同条款优化助手。优化用户选中的合同段落，使其更清晰、严谨。只返回优化后的文本。' },
          { role: 'user', content: '优化以下合同条款：\n' + selectedText }
        ],
        temperature: 0.3, max_tokens: 2000
      }),
      signal: timeout(20000)
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const polished = data.choices[0].message.content.trim();

    if (confirm('AI 优化结果：\n\n' + polished + '\n\n是否替换原文？')) {
      quillEditor.deleteText(selection.index, selection.length);
      quillEditor.insertText(selection.index, polished);
      quillEditor.setSelection(selection.index, polished.length);
      showToast('已替换', 'success');
    }
  } catch(e) {
    showToast('AI 优化失败: ' + e.message, 'error');
  }
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  renderEmpty();
  await checkHealth();
  // Keep checking
  setInterval(checkHealth, 30000);

  // Keyboard shortcut for rule editor
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'r') {
      e.preventDefault();
      document.getElementById('ruleEditorOverlay').classList.toggle('open');
      if (document.getElementById('ruleEditorOverlay').classList.contains('open')) {
        editingRuleId = null;
        renderRuleEditor();
      }
    }
    if (e.key === 'Escape') {
      document.getElementById('ruleEditorOverlay').classList.remove('open');
      document.getElementById('configOverlay').classList.remove('open');
    }
  });
});
</script>
